<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tamma</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #f5f0eb;
      font-family: 'Inter', sans-serif;
      color: #3a3028;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: background 0.3s, color 0.3s;
    }

    body.dark {
      background-color: #2a2520;
      color: #e8ddd4;
    }

    canvas {
      position: fixed;
      top: 0; left: 0;
      z-index: 0;
      pointer-events: none;
    }

    .landing {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 24px;
    }

    .landing-name {
      font-size: clamp(3.5rem, 12vw, 7rem);
      font-weight: 700;
      letter-spacing: -2px;
      color: #2e2318;
      line-height: 1;
    }

    body.dark .landing-name { color: #f0ebe5; }

    .landing-sub {
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      color: #8a7060;
      margin-top: 16px;
      letter-spacing: 0.02em;
    }

    body.dark .landing-sub { color: #9a8878; }

    .enter-btn {
      display: inline-block;
      margin-top: 48px;
      padding: 14px 36px;
      background: #3a2e26;
      color: #fff8f3;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      letter-spacing: 0.03em;
      transition: background 0.2s, transform 0.2s;
    }

    .enter-btn:hover {
      background: #5a4a3a;
      transform: translateY(-2px);
    }

    body.dark .enter-btn { background: #e8ddd4; color: #24201a; }
    body.dark .enter-btn:hover { background: #d0c5bc; }

    .dark-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(255,255,255,0.6);
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 1.1rem;
      cursor: pointer;
      backdrop-filter: blur(6px);
      transition: background 0.2s;
      z-index: 2;
    }

    body.dark .dark-toggle { background: rgba(40,30,20,0.6); }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>

  <button class="dark-toggle" id="darkToggle">🌙</button>

  <div class="landing">
    <h1 class="landing-name">Tamma</h1>
    <p class="landing-sub">Welcome</p>
    <a class="enter-btn" href="explore.html">Enter →</a>
  </div>

  <script>
    const darkToggle = document.getElementById('darkToggle');
    let isDark = localStorage.getItem('theme') === 'dark';
    if (isDark) {
      document.body.classList.add('dark');
      darkToggle.textContent = '☀️';
    }
    darkToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      isDark = document.body.classList.contains('dark');
      darkToggle.textContent = isDark ? '☀️' : '🌙';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    // Particle system
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const PARTICLE_COUNT = 60;
    const CONNECT_DIST = 140;
    let particles = [];

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function randomBetween(a, b) { return a + Math.random() * (b - a); }

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particles.push({
        x: randomBetween(0, window.innerWidth),
        y: randomBetween(0, window.innerHeight),
        vx: randomBetween(-0.4, 0.4),
        vy: randomBetween(-0.4, 0.4),
        r: randomBetween(2, 4),
      });
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const dotColor = isDark ? 'rgba(200,180,160,' : 'rgba(100,70,50,';

      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];

        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0 || p.x > canvas.width)  p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = dotColor + '0.7)';
        ctx.fill();

        for (let j = i + 1; j < particles.length; j++) {
          const q = particles[j];
          const dx = p.x - q.x;
          const dy = p.y - q.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < CONNECT_DIST) {
            const alpha = (1 - dist / CONNECT_DIST) * 0.4;
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(q.x, q.y);
            ctx.strokeStyle = dotColor + alpha + ')';
            ctx.lineWidth = 1;
            ctx.stroke();
          }
        }
      }

      requestAnimationFrame(draw);
    }

    draw();
  </script>

</body>
</html>
